<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Mirror -->
  <line x1="300" y1="50" x2="300" y2="350" stroke="#94a3b8" stroke-width="10"/>
  
  <!-- Object -->
  <g transform="translate(150, 200)">
    <text x="0" y="-80" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">OBJECT (P)</text>
    <path d="M-10 -60 L10 -60 L10 60 L-10 60 Z" fill="#6366f1"/>
    <path d="M-20 -60 L0 -80 L20 -60 Z" fill="#6366f1"/>
  </g>
  
  <!-- Image -->
  <g transform="translate(450, 200)">
    <text x="0" y="-80" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">IMAGE (P')</text>
    <path d="M-10 -60 L10 -60 L10 60 L-10 60 Z" fill="#10b981" opacity="0.6"/>
    <path d="M-20 -60 L0 -80 L20 -60 Z" fill="#10b981" opacity="0.6"/>
  </g>
  
  <!-- Labels -->
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Distance d = Distance d'</text>
  <text x="300" y="30" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="20" text-anchor="middle">LATERAL INVERSION</text>
</svg>
