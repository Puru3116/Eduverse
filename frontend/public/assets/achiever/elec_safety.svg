<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">ELECTRICAL SAFETY</text>

  <!-- No Wet Hands -->
  <g transform="translate(100, 100)">
    <rect width="180" height="180" rx="15" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <path d="M40 140 Q 50 100 90 100 Q 130 100 140 140" fill="none" stroke="#f43f5e" stroke-width="4"/> <!-- Hand -->
    <circle cx="90" cy="120" r="5" fill="#38bdf8"/> <!-- Water drop -->
    <path d="M40 40 L140 140 M140 40 L40 140" stroke="#ef4444" stroke-width="8" opacity="0.8"/>
    <text x="90" y="170" fill="#f43f5e" font-size="12" text-anchor="middle">NO WET HANDS</text>
  </g>

  <!-- Insulation -->
  <g transform="translate(320, 100)">
    <rect width="180" height="180" rx="15" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="30" y="85" width="120" height="10" fill="#f59e0b"/> <!-- Copper -->
    <rect x="20" y="80" width="140" height="20" rx="10" fill="#6366f1" opacity="0.6"/> <!-- Plastic -->
    <text x="90" y="170" fill="#10b981" font-size="12" text-anchor="middle">USE INSULATION</text>
  </g>
</svg>
