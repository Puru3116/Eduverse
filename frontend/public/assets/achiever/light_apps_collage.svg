<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="40" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">LIGHT IN ACTION</text>
  
  <g transform="translate(50, 80)">
    <!-- Periscope -->
    <rect width="230" height="130" rx="15" fill="#1e293b"/>
    <path d="M80 30 L100 30 L100 100 L150 100" stroke="#6366f1" stroke-width="10" fill="none"/>
    <text x="115" y="20" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">PERISCOPE</text>
    
    <!-- Mirror -->
    <rect x="250" width="230" height="130" rx="15" fill="#1e293b"/>
    <rect x="340" y="40" width="50" height="50" fill="#94a3b8" rx="5"/>
    <text x="365" y="20" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">REAR-VIEW MIRROR</text>
  </g>
  
  <g transform="translate(50, 230)">
    <!-- Kaleidoscope -->
    <rect width="230" height="130" rx="15" fill="#1e293b"/>
    <circle cx="115" cy="65" r="30" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <path d="M115 35 L115 95 M85 65 L145 65" stroke="#f59e0b" stroke-width="1"/>
    <text x="115" y="20" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">KALEIDOSCOPE</text>
    
    <!-- Water -->
    <rect x="250" width="230" height="130" rx="15" fill="#1e293b"/>
    <path d="M280 90 Q 365 110 450 90" stroke="#38bdf8" stroke-width="4" fill="none"/>
    <text x="365" y="20" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">WATER REFLECTION</text>
  </g>
</svg>
