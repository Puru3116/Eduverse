<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">COAL: SOLID FOSSIL FUEL</text>

  <!-- Coal lumps -->
  <g transform="translate(200, 150)">
    <path d="M0 50 L40 0 L100 20 L80 80 L20 90 Z" fill="#111827" stroke="#4b5563" stroke-width="2"/>
    <path d="M120 40 L160 10 L200 50 L180 90 L130 80 Z" fill="#111827" stroke="#4b5563" stroke-width="2"/>
    <text x="100" y="130" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Buried Plant Remains</text>
  </g>
  
  <!-- Power Plant -->
  <g transform="translate(450, 100)">
    <rect x="0" y="50" width="60" height="100" fill="#475569"/>
    <path d="M10 50 L10 0 L30 0 L30 50" fill="#94a3b8"/>
    <circle cx="20" cy="-10" r="10" fill="#ffffff" opacity="0.4"/> <!-- Smoke -->
  </g>
</svg>
