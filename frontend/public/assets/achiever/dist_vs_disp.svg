<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Path -->
  <path d="M100 300 Q 150 100 250 250 T 500 150" stroke="#475569" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
  <text x="250" y="100" fill="#475569" font-family="sans-serif" font-weight="bold" font-size="16">Actual Path (Distance)</text>
  
  <!-- Displacement Arrow -->
  <line x1="100" y1="300" x2="500" y2="150" stroke="#6366f1" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <text x="300" y="260" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="20" text-anchor="middle">DISPLACEMENT</text>
  <text x="300" y="285" fill="#6366f1" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">(Shortest Path)</text>

  <!-- Points -->
  <circle cx="100" cy="300" r="12" fill="#ef4444"/>
  <text x="100" y="340" fill="#ef4444" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">START</text>
  
  <circle cx="500" cy="150" r="12" fill="#10b981"/>
  <text x="500" y="120" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">END</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
    </marker>
  </defs>
</svg>
