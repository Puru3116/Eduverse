<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Sun -->
  <circle cx="100" cy="100" r="40" fill="#f59e0b">
    <animate attributeName="r" values="38;42;38" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M100 40 L100 20 M142 58 L157 43 M160 100 L180 100 M142 142 L157 157 M100 160 L100 180 M58 142 L43 157 M40 100 L20 100 M58 58 L43 43" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Light Rays -->
  <path d="M150 120 L450 120" stroke="#fef08a" stroke-width="2" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <text x="300" y="250" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="28" text-anchor="middle">LIGHT = ENERGY</text>
  <text x="300" y="280" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Light travels and interacts with objects to make them visible.</text>
</svg>
