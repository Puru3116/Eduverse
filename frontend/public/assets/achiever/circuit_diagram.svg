<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Battery -->
  <rect x="250" y="300" width="100" height="40" rx="5" fill="#1e293b" stroke="#ffffff"/>
  <rect x="350" y="310" width="10" height="20" fill="#f59e0b"/>
  <text x="300" y="325" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">BATTERY</text>
  
  <!-- Wires -->
  <path d="M250 320 L100 320 L100 150 L200 150" fill="none" stroke="#94a3b8" stroke-width="4"/>
  <path d="M360 320 L500 320 L500 150 L400 150" fill="none" stroke="#94a3b8" stroke-width="4"/>
  
  <!-- Switch -->
  <line x1="200" y1="150" x2="250" y2="120" stroke="#f43f5e" stroke-width="4"/>
  <circle cx="200" cy="150" r="5" fill="#ffffff"/>
  <circle cx="250" cy="150" r="5" fill="#ffffff"/>
  <text x="225" y="100" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">OPEN SWITCH</text>
  
  <!-- Bulb -->
  <g transform="translate(350, 150)">
    <circle cx="0" cy="0" r="30" fill="#1e293b" stroke="#ffffff" stroke-width="2"/>
    <path d="M-10 10 Q 0 -20 10 10" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="-10" y="25" width="20" height="15" fill="#475569"/>
    <text x="0" y="60" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">BULB (OFF)</text>
  </g>
  
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">BASIC ELECTRIC CIRCUIT</text>
</svg>
