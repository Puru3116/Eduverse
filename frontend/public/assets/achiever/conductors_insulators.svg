<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="40" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">ELECTRICAL CONDUCTIVITY</text>

  <!-- Conductors -->
  <g transform="translate(50, 80)">
    <rect width="230" height="280" rx="20" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="115" y="30" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">CONDUCTORS</text>
    <rect x="40" y="100" width="150" height="15" rx="5" fill="#94a3b8"/> <!-- Copper Wire -->
    <text x="115" y="140" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Metals (Copper, Iron)</text>
    <text x="115" y="230" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Allow current to flow.</text>
  </g>

  <!-- Insulators -->
  <g transform="translate(320, 80)">
    <rect width="230" height="280" rx="20" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="115" y="30" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">INSULATORS</text>
    <rect x="40" y="100" width="150" height="15" rx="5" fill="#475569"/> <!-- Rubber -->
    <text x="115" y="140" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Rubber, Plastic, Wood</text>
    <text x="115" y="230" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Block current flow.</text>
  </g>
</svg>
