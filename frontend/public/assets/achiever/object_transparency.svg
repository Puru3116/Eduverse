<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Transparent -->
  <g transform="translate(50, 50)">
    <rect width="150" height="250" rx="15" fill="#1e293b"/>
    <text x="75" y="30" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">TRANSPARENT</text>
    <rect x="40" y="80" width="70" height="100" fill="#38bdf8" opacity="0.2" stroke="#38bdf8"/>
    <path d="M20 130 L130 130" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow-white)"/>
    <text x="75" y="220" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Passes Completely</text>
  </g>

  <!-- Translucent -->
  <g transform="translate(225, 50)">
    <rect width="150" height="250" rx="15" fill="#1e293b"/>
    <text x="75" y="30" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">TRANSLUCENT</text>
    <rect x="40" y="80" width="70" height="100" fill="#f59e0b" opacity="0.5" stroke="#f59e0b"/>
    <path d="M20 130 L75 130" stroke="#ffffff" stroke-width="2"/>
    <path d="M75 120 L130 110 M75 130 L130 130 M75 140 L130 150" stroke="#ffffff" stroke-width="1" opacity="0.5" marker-end="url(#arrow-white-small)"/>
    <text x="75" y="220" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Passes Partially</text>
  </g>

  <!-- Opaque -->
  <g transform="translate(400, 50)">
    <rect width="150" height="250" rx="15" fill="#1e293b"/>
    <text x="75" y="30" fill="#ef4444" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">OPAQUE</text>
    <rect x="40" y="80" width="70" height="100" fill="#475569" stroke="#ef4444"/>
    <path d="M20 130 L40 130" stroke="#ffffff" stroke-width="2"/>
    <path d="M40 130 L20 150" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow-white)"/>
    <text x="75" y="220" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Blocked Completely</text>
  </g>

  <defs>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
    <marker id="arrow-white-small" markerWidth="6" markerHeight="6" refX="0" refY="2" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4 L6,2 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
