<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Inertia (1st Law) -->
  <g transform="translate(50,50)">
    <rect width="150" height="100" rx="15" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="75" y="30" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">1st LAW</text>
    <circle cx="75" cy="70" r="15" fill="#6366f1"/>
    <text x="75" y="90" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">INERTIA</text>
  </g>

  <!-- Acceleration (2nd Law) -->
  <g transform="translate(225,50)">
    <rect width="150" height="100" rx="15" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="75" y="30" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">2nd LAW</text>
    <text x="75" y="70" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">F = m × a</text>
  </g>

  <!-- Reaction (3rd Law) -->
  <g transform="translate(400,50)">
    <rect width="150" height="100" rx="15" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="75" y="30" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">3rd LAW</text>
    <path d="M40 70 L70 70" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)"/>
    <path d="M110 70 L80 70" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)"/>
    <text x="75" y="90" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">ACTION = REACTION</text>
  </g>

  <!-- Pressure -->
  <g transform="translate(50,200)">
    <rect width="500" height="150" rx="20" fill="#0f172a" border="1px solid #1e293b"/>
    <text x="250" y="40" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="18" text-anchor="middle">PRESSURE = FORCE / AREA</text>
    
    <!-- Sharp side -->
    <path d="M100 130 L150 130 L125 70 Z" fill="#38bdf8"/>
    <text x="125" y="145" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Small Area = HIGH Pressure</text>
    
    <!-- Blunt side -->
    <rect x="350" y="70" width="50" height="60" fill="#475569"/>
    <text x="375" y="145" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Large Area = LOW Pressure</text>
  </g>

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
