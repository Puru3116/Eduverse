<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">WHERE DOES ENERGY COME FROM?</text>

  <!-- Collection of sources -->
  <g transform="translate(50, 100)">
    <!-- Natural -->
    <rect width="150" height="150" rx="15" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="75" cy="60" r="30" fill="#f59e0b"/>
    <text x="75" y="120" fill="#ffffff" font-size="12" text-anchor="middle">NATURAL (SUN)</text>
    
    <!-- Mineral -->
    <g transform="translate(200, 0)">
       <rect width="150" height="150" rx="15" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
       <rect x="50" y="40" width="50" height="50" fill="#475569"/>
       <text x="75" y="120" fill="#ffffff" font-size="12" text-anchor="middle">MINERAL (COAL)</text>
    </g>
    
    <!-- Kinetic -->
    <g transform="translate(400, 0)">
       <rect width="150" height="150" rx="15" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
       <path d="M40 75 L110 75" stroke="#38bdf8" stroke-width="5" stroke-dasharray="10,5"/>
       <text x="75" y="120" fill="#ffffff" font-size="12" text-anchor="middle">KINETIC (WIND)</text>
    </g>
  </g>
  
  <text x="300" y="350" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Sources of energy are resources found in nature.</text>
</svg>
