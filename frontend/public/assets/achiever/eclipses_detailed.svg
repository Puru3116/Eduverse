<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Solar -->
  <g transform="translate(0,0)">
    <text x="300" y="40" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">SOLAR ECLIPSE (Moon between Sun & Earth)</text>
    <circle cx="100" cy="120" r="40" fill="#f59e0b"/> <!-- Sun -->
    <circle cx="300" cy="120" r="15" fill="#475569"/> <!-- Moon -->
    <circle cx="500" cy="120" r="30" fill="#38bdf8"/> <!-- Earth -->
    <path d="M315 120 L500 110 L500 130 Z" fill="#000000" opacity="0.5"/> <!-- Umbra -->
  </g>
  
  <!-- Lunar -->
  <g transform="translate(0,200)">
    <text x="300" y="40" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">LUNAR ECLIPSE (Earth between Sun & Moon)</text>
    <circle cx="100" cy="120" r="40" fill="#f59e0b"/> <!-- Sun -->
    <circle cx="300" cy="120" r="30" fill="#38bdf8"/> <!-- Earth -->
    <circle cx="500" cy="120" r="15" fill="#475569"/> <!-- Moon -->
    <path d="M330 120 L500 100 L500 140 Z" fill="#000000" opacity="0.5"/> <!-- Umbra -->
  </g>
</svg>
