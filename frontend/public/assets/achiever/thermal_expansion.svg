<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="60" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">THERMAL EXPANSION</text>

  <!-- Cool -->
  <g transform="translate(100, 150)">
     <rect x="0" y="0" width="100" height="20" fill="#38bdf8" rx="5"/>
     <text x="50" y="50" fill="#38bdf8" font-family="sans-serif" font-size="12" text-anchor="middle">COLD (Contracted)</text>
  </g>

  <!-- Heat -->
  <g transform="translate(100, 250)">
     <rect x="0" y="0" width="150" height="20" fill="#ef4444" rx="5"/>
     <text x="75" y="50" fill="#ef4444" font-family="sans-serif" font-size="12" text-anchor="middle">HOT (Expanded)</text>
  </g>

  <path d="M350 200 L450 200" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow-white)"/>
  <text x="400" y="230" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Particles move apart</text>

  <defs>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
