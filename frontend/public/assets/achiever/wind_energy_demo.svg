<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Windmill -->
  <g transform="translate(300, 250)">
    <rect x="-5" y="0" width="10" height="100" fill="#94a3b8"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      <path d="M0 0 L-10 -60 L10 -60 Z" fill="#ffffff" opacity="0.8"/>
      <path d="M0 0 L-60 10 L-60 -10 Z" fill="#ffffff" opacity="0.8"/>
      <path d="M0 0 L10 60 L-10 60 Z" fill="#ffffff" opacity="0.8"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="#475569"/>
  </g>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">WIND ENERGY (RENEWABLE)</text>
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Mechanical energy converted to electricity.</text>
</svg>
