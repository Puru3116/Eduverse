<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">BIOMASS ENERGY</text>

  <!-- Bio-gas Plant -->
  <g transform="translate(200, 150)">
    <path d="M0 100 Q 100 0 200 100 L200 150 L0 150 Z" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="180" fill="#10b981" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">BIOGAS DIGESTER</text>
    <path d="M50 150 L50 200 M150 150 L150 200" stroke="#94a3b8" stroke-width="4"/> <!-- Pipes -->
    <circle cx="100" cy="80" r="10" fill="#38bdf8" opacity="0.5"/> <!-- Methane -->
  </g>
  
  <text x="300" y="100" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Energy from Organic Waste (Wood, Dung, Crops)</text>
</svg>
