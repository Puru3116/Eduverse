<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">HEATING EFFECT</text>

  <!-- Electric Iron -->
  <g transform="translate(150, 150)">
    <path d="M0 100 L200 100 Q 200 50 100 50 L0 100 Z" fill="#1e293b" stroke="#ffffff" stroke-width="2"/>
    <path d="M50 50 L50 20 L150 20 L150 50" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
    <!-- Heat lines -->
    <path d="M50 110 Q 60 130 70 110 M100 110 Q 110 130 120 110 M150 110 Q 160 130 170 110" stroke="#f43f5e" stroke-width="2">
       <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </path>
    <text x="100" y="150" fill="#f43f5e" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">RESISTANCE -> HEAT</text>
  </g>
</svg>
