<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Natural -->
  <g transform="translate(50, 50)">
    <rect width="230" height="300" rx="20" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="115" y="40" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">NATURAL SOURCES</text>
    <circle cx="115" cy="120" r="30" fill="#f59e0b"/>
    <path d="M115 120 L160 120 M70 120 L115 120 M115 75 L115 120 M115 120 L115 165" stroke="#f59e0b" stroke-width="2"/>
    <text x="115" y="240" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">SUN & STARS</text>
    <text x="115" y="265" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Found in Nature</text>
  </g>
  
  <!-- Artificial -->
  <g transform="translate(320, 50)">
    <rect width="230" height="300" rx="20" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="115" y="40" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">ARTIFICIAL SOURCES</text>
    <path d="M100 150 L130 150 L115 100 Z" fill="#6366f1"/>
    <circle cx="115" cy="110" r="15" fill="#fef08a" opacity="0.8"/>
    <text x="115" y="240" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">BULBS & TORCHES</text>
    <text x="115" y="265" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Man-made Objects</text>
  </g>
</svg>
