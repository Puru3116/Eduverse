<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">WHAT IS HEAT?</text>

  <!-- Hot particles -->
  <g transform="translate(100, 150)">
    <circle cx="20" cy="20" r="5" fill="#ef4444"> <animateTransform attributeName="transform" type="translate" values="0,0; 5,5; 0,0" dur="0.2s" repeatCount="indefinite"/> </circle>
    <circle cx="50" cy="10" r="5" fill="#ef4444"> <animateTransform attributeName="transform" type="translate" values="0,0; -5,3; 0,0" dur="0.15s" repeatCount="indefinite"/> </circle>
    <circle cx="80" cy="30" r="5" fill="#ef4444"> <animateTransform attributeName="transform" type="translate" values="0,0; 3,-5; 0,0" dur="0.25s" repeatCount="indefinite"/> </circle>
    <text x="50" y="80" fill="#ef4444" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">HOT (Fast)</text>
  </g>

  <!-- Cold particles -->
  <g transform="translate(400, 150)">
    <circle cx="20" cy="20" r="5" fill="#38bdf8"/>
    <circle cx="50" cy="10" r="5" fill="#38bdf8"/>
    <circle cx="80" cy="30" r="5" fill="#38bdf8"/>
    <text x="50" y="80" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">COLD (Slow)</text>
  </g>

  <path d="M220 180 L380 180" stroke="#ffffff" stroke-width="4" marker-end="url(#arrow-white)"/>
  <text x="300" y="210" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">Energy Flow</text>

  <defs>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
