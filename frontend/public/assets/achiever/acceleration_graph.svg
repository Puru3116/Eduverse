<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Axes -->
  <line x1="80" y1="320" x2="520" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <line x1="80" y1="320" x2="80" y2="50" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <text x="530" y="335" fill="#475569" font-family="sans-serif" font-size="12">Time</text>
  <text x="60" y="45" fill="#475569" font-family="sans-serif" font-size="12">Velocity</text>
  
  <!-- Acceleration curve -->
  <path d="M80 320 L250 200 L400 200 L500 300" stroke="#6366f1" stroke-width="4" fill="none"/>
  
  <!-- Labels -->
  <text x="160" y="240" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="12" transform="rotate(-35, 160, 240)">ACCELERATION</text>
  <text x="325" y="190" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="12">CONSTANT VELOCITY</text>
  <text x="450" y="240" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="12" transform="rotate(45, 450, 240)">DECELERATION</text>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
</svg>
