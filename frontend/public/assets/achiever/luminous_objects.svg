<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Luminous -->
  <g transform="translate(50, 50)">
    <rect width="230" height="300" rx="20" fill="#1e293b" stroke="#fef08a" stroke-width="2"/>
    <text x="115" y="40" fill="#fef08a" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">LUMINOUS</text>
    <circle cx="115" cy="130" r="25" fill="#fef08a">
       <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="115" y="220" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Emits Own Light</text>
    <text x="115" y="245" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">(Sun, Glowing Bulb)</text>
  </g>
  
  <!-- Non-Luminous -->
  <g transform="translate(320, 50)">
    <rect width="230" height="300" rx="20" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
    <text x="115" y="40" fill="#94a3b8" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">NON-LUMINOUS</text>
    <rect x="90" y="100" width="50" height="70" fill="#475569" stroke="#94a3b8"/>
    <path d="M40 100 L90 135" stroke="#fef08a" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="115" y="220" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">Reflects Other Light</text>
    <text x="115" y="245" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">(Moon, Book, Mirror)</text>
  </g>
</svg>
