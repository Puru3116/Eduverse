<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Source -->
  <circle cx="50" cy="200" r="10" fill="#fef08a"/>
  
  <!-- Barriers -->
  <rect x="150" y="50" width="10" height="300" fill="#475569"/>
  <rect x="300" y="50" width="10" height="300" fill="#475569"/>
  
  <!-- Holes -->
  <rect x="150" y="190" width="10" height="20" fill="#020617"/>
  <rect x="300" y="190" width="10" height="20" fill="#020617"/>
  
  <!-- Light Ray -->
  <line x1="60" y1="200" x2="550" y2="200" stroke="#fef08a" stroke-width="4" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <text x="300" y="350" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="20" text-anchor="middle">RECTILINEAR PROPAGATION</text>
  <text x="300" y="375" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Light always travels in a straight line.</text>
</svg>
