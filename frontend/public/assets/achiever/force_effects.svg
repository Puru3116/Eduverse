<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Grid -->
  <g transform="translate(50, 50)">
    <!-- Change Shape -->
    <rect width="230" height="130" rx="15" fill="#1e293b"/>
    <circle cx="115" cy="65" r="30" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M85 65 Q 115 45 145 65 Q 115 85 85 65" fill="#6366f1" opacity="0.6"/>
    <text x="115" y="115" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">CHANGE SHAPE</text>
    
    <!-- Change Direction -->
    <rect x="250" width="230" height="130" rx="15" fill="#1e293b"/>
    <path d="M280 65 L350 65 L330 35" stroke="#10b981" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
    <text x="365" y="115" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">CHANGE DIRECTION</text>
  </g>
  
  <g transform="translate(50, 200)">
    <!-- Speed Up -->
    <rect width="480" height="150" rx="15" fill="#1e293b"/>
    <rect x="40" y="60" width="60" height="30" rx="5" fill="#f59e0b"/>
    <path d="M110 75 L350 75" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow-amber)"/>
    <text x="240" y="120" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">CHANGE SPEED (ACCELERATION)</text>
  </g>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
