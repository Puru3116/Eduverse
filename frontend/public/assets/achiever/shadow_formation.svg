<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Source -->
  <circle cx="100" cy="100" r="20" fill="#f59e0b"/>
  
  <!-- Object -->
  <rect x="250" y="150" width="100" height="150" fill="#1e293b" stroke="#ffffff"/>
  
  <!-- Screen -->
  <rect x="500" y="50" width="20" height="300" fill="#475569"/>
  
  <!-- Light Rays -->
  <line x1="120" y1="100" x2="500" y2="50" stroke="#fef08a" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="120" y1="100" x2="500" y2="350" stroke="#fef08a" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Shadow -->
  <rect x="500" y="110" width="20" height="180" fill="#000000" opacity="0.8"/>
  <text x="540" y="200" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="14" transform="rotate(90, 540, 200)">SHADOW</text>
  
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Requires Source, Opaque Object, and Screen</text>
</svg>
