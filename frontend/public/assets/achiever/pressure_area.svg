<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Pressure Formula -->
  <rect x="50" y="40" width="500" height="80" rx="15" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="300" y="85" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="28" text-anchor="middle">PRESSURE = FORCE / AREA</text>
  
  <!-- Sharp Object -->
  <g transform="translate(50, 150)">
    <rect width="230" height="200" rx="15" fill="#0f172a"/>
    <path d="M115 150 L130 150 L115 50 L100 150 Z" fill="#38bdf8"/>
    <text x="115" y="170" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">HIGH PRESSURE</text>
    <text x="115" y="185" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">(Small Surface Area)</text>
  </g>
  
  <!-- Blunt Object -->
  <g transform="translate(320, 150)">
    <rect width="230" height="200" rx="15" fill="#0f172a"/>
    <rect x="80" y="50" width="70" height="100" fill="#475569"/>
    <text x="115" y="170" fill="#475569" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">LOW PRESSURE</text>
    <text x="115" y="185" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">(Large Surface Area)</text>
  </g>
</svg>
