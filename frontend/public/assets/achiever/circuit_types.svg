<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="40" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">CIRCUIT TYPES</text>

  <!-- Closed Circuit -->
  <g transform="translate(50, 80)">
    <rect width="230" height="250" rx="20" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="115" y="30" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">CLOSED CIRCUIT (ON)</text>
    <path d="M40 200 L115 200 L190 200" stroke="#ffffff" stroke-width="4"/>
    <circle cx="115" cy="120" r="30" fill="#fef08a">
       <animate attributeName="opacity" values="1;0.8;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="115" y="230" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">Current flows, Bulb glows.</text>
  </g>

  <!-- Open Circuit -->
  <g transform="translate(320, 80)">
    <rect width="230" height="250" rx="20" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="115" y="30" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">OPEN CIRCUIT (OFF)</text>
    <path d="M40 200 L100 200 M130 180 L190 200" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <circle cx="115" cy="120" r="30" fill="#475569"/>
    <text x="115" y="230" fill="#ffffff" font-family="sans-serif" font-size="10" text-anchor="middle">Path broken, Bulb dark.</text>
  </g>
</svg>
