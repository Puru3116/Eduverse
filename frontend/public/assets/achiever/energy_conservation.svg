<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">CONSERVATION OF ENERGY</text>
  
  <!-- Switch Off -->
  <g transform="translate(150, 150)">
    <rect width="80" height="120" rx="10" fill="#1e293b" stroke="#ffffff"/>
    <rect x="20" y="60" width="40" height="40" fill="#f43f5e"/>
    <text x="40" y="150" fill="#ffffff" font-size="12" text-anchor="middle">SWITCH OFF</text>
  </g>
  
  <!-- Solar Usage -->
  <g transform="translate(370, 150)">
    <rect width="80" height="80" fill="#38bdf8" opacity="0.3"/>
    <circle cx="40" cy="-20" r="15" fill="#f59e0b"/>
    <text x="40" y="110" fill="#ffffff" font-size="12" text-anchor="middle">USE SOLAR</text>
  </g>
  
  <text x="300" y="350" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="20" text-anchor="middle">SAVE ENERGY, SAVE EARTH</text>
</svg>
