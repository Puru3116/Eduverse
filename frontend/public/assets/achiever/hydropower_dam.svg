<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Dam -->
  <path d="M100 100 L200 100 L250 300 L100 300 Z" fill="#475569"/>
  <rect x="0" y="100" width="100" height="200" fill="#38bdf8" opacity="0.6"/> <!-- Water Reservoir -->
  
  <path d="M200 250 L400 250" stroke="#38bdf8" stroke-width="10" marker-end="url(#arrow-blue)"/>
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">HYDROPOWER (WATER ENERGY)</text>
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Flowing water turns turbines to make power.</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
