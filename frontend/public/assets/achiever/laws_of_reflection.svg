<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Mirror line -->
  <line x1="100" y1="300" x2="500" y2="300" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M100 305 L500 305" stroke="#1e293b" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="300" y="340" fill="#94a3b8" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">PLANE MIRROR</text>
  
  <!-- Normal -->
  <line x1="300" y1="300" x2="300" y2="100" stroke="#475569" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="300" y="90" fill="#475569" font-family="sans-serif" font-size="12" text-anchor="middle">NORMAL</text>
  
  <!-- Rays -->
  <path d="M150 100 L300 300" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="180" y="150" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="14">Incident Ray</text>
  
  <path d="M300 300 L450 100" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="400" y="150" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="14">Reflected Ray</text>
  
  <!-- Angles -->
  <path d="M300 250 A 50 50 0 0 0 270 260" fill="none" stroke="#f43f5e" stroke-width="2"/>
  <text x="270" y="240" fill="#f43f5e" font-family="sans-serif" font-size="20">∠i</text>
  
  <path d="M300 250 A 50 50 0 0 1 330 260" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="240" fill="#10b981" font-family="sans-serif" font-size="20">∠r</text>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">∠i = ∠r</text>

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f43f5e" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
