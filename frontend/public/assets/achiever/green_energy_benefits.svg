<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">ADVANTAGES OF GREEN ENERGY</text>

  <g transform="translate(100, 120)">
    <!-- Clean Earth -->
    <circle cx="100" cy="100" r="60" fill="#10b981" opacity="0.3"/>
    <path d="M80 100 Q 100 80 120 100 Q 100 120 80 100" fill="#10b981"/> <!-- Leaf -->
    <text x="100" y="180" fill="#10b981" font-weight="black" font-size="16" text-anchor="middle">NO POLLUTION</text>
    
    <!-- Infinite -->
    <g transform="translate(300, 0)">
       <path d="M0 100 Q 50 50 100 100 Q 50 150 0 100" fill="none" stroke="#38bdf8" stroke-width="4"/> <!-- Infinity -->
       <text x="50" y="180" fill="#38bdf8" font-weight="black" font-size="16" text-anchor="middle">UNLIMITED</text>
    </g>
  </g>
</svg>
