<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">SOURCES OF HEAT</text>

  <g transform="translate(50, 100)">
    <!-- Sun -->
    <circle cx="100" cy="80" r="40" fill="#f59e0b"/>
    <text x="100" y="160" fill="#ffffff" font-size="14" text-anchor="middle">SUN (Radiation)</text>
    
    <!-- Combustion -->
    <g transform="translate(300, 40)">
       <path d="M0 80 L60 80 M10 80 L30 30 L50 80" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
       <path d="M30 70 Q 50 30 30 0 Q 10 30 30 70" fill="#ef4444"/>
       <text x="30" y="120" fill="#ffffff" font-size="14" text-anchor="middle">BURNING (Fire)</text>
    </g>
    
    <!-- Friction -->
    <g transform="translate(100, 200)">
       <path d="M0 20 L40 0 M0 0 L40 20" stroke="#fef08a" stroke-width="4"/>
       <text x="20" y="60" fill="#ffffff" font-size="14" text-anchor="middle">FRICTION (Rubbing)</text>
    </g>
  </g>
</svg>
