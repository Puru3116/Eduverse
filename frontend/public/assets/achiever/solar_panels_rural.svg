<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Solar Panel -->
  <g transform="translate(100, 150)">
    <rect width="120" height="80" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#38bdf8" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#38bdf8" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="80" stroke="#38bdf8" stroke-width="1"/>
    <text x="60" y="110" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">SOLAR PANEL</text>
  </g>
  
  <!-- Rural Lamp -->
  <g transform="translate(400, 150)">
    <circle cx="0" cy="0" r="40" fill="#fef08a" opacity="0.4"/>
    <rect x="-10" y="0" width="20" height="40" fill="#94a3b8"/>
    <circle cx="0" cy="-10" r="10" fill="#fef08a"/>
    <text x="0" y="70" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">SOLAR LAMP</text>
  </g>
  
  <path d="M220 190 L350 190" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="300" y="40" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">SOLAR ENERGY IN RURAL AREAS</text>
  <text x="300" y="380" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Powering homes and farms sustainably.</text>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
