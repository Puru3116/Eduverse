<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <!-- Conduction -->
  <g transform="translate(50, 50)">
     <rect width="150" height="120" rx="15" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
     <text x="75" y="25" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">CONDUCTION</text>
     <rect x="20" y="60" width="110" height="10" fill="#94a3b8"/> <!-- Metal Rod -->
     <circle cx="20" cy="65" r="15" fill="#ef4444"/> <!-- Heat source -->
     <path d="M40 65 L130 65" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
     <text x="75" y="105" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Transfer in Solids</text>
  </g>
  
  <!-- Convection -->
  <g transform="translate(225, 50)">
     <rect width="150" height="120" rx="15" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
     <text x="75" y="25" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">CONVECTION</text>
     <path d="M40 90 Q 75 40 110 90" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)"/>
     <path d="M110 90 Q 75 140 40 90" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
     <text x="75" y="105" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Fluids (Liquids/Gases)</text>
  </g>
  
  <!-- Radiation -->
  <g transform="translate(400, 50)">
     <rect width="150" height="120" rx="15" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
     <text x="75" y="25" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="12" text-anchor="middle">RADIATION</text>
     <circle cx="75" cy="70" r="15" fill="#f59e0b"/>
     <path d="M75 70 L130 70 M75 70 L20 70 M75 70 L75 20 M75 70 L75 120" stroke="#fef08a" stroke-width="1" stroke-dasharray="5,2"/>
     <text x="75" y="105" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">No Medium Required</text>
  </g>

  <text x="300" y="380" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="20" text-anchor="middle">MODES OF HEAT TRANSFER</text>

  <defs>
    <marker id="arrow-red" markerWidth="6" markerHeight="6" refX="0" refY="2" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4 L6,2 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="0" refY="2" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4 L6,2 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
