<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">THERMOMETER SCALE</text>

  <rect x="280" y="100" width="40" height="250" rx="20" fill="#1e293b" stroke="#ffffff"/>
  <rect x="295" y="120" width="10" height="210" fill="#ef4444"/> <!-- Liquid -->
  
  <!-- Scale -->
  <line x1="320" y1="120" x2="330" y2="120" stroke="#ffffff"/> <text x="340" y="125" fill="#ffffff" font-size="12">100°C</text>
  <line x1="320" y1="225" x2="330" y2="225" stroke="#ffffff"/> <text x="340" y="230" fill="#ffffff" font-size="12">37°C</text>
  <line x1="320" y1="330" x2="330" y2="330" stroke="#ffffff"/> <text x="340" y="335" fill="#ffffff" font-size="12">0°C</text>
  
  <text x="150" y="225" fill="#38bdf8" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">MEASURES COLDNESS</text>
  <text x="450" y="225" fill="#ef4444" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">MEASURES HOTNESS</text>
</svg>
