<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="40" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="28" text-anchor="middle">LIGHT SOURCES</text>
  
  <!-- Divider -->
  <line x1="300" y1="80" x2="300" y2="350" stroke="#475569" stroke-width="2"/>
  
  <!-- Natural -->
  <g transform="translate(0,0)">
    <text x="150" y="80" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">NATURAL LIGHT SOURCES</text>
    
    <!-- Sun -->
    <g transform="translate(80, 130)">
       <circle cx="0" cy="0" r="20" fill="#f59e0b"/>
       <path d="M0 -30 L0 -25 M21 -21 L17 -17 M30 0 L25 0 M21 21 L17 17 M0 30 L0 25 M-21 21 L-17 17 M-30 0 L-25 0 M-21 -21 L-17 -17" stroke="#f59e0b" stroke-width="3"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">SUN</text>
    </g>
    
    <!-- Fire -->
    <g transform="translate(220, 130)">
       <path d="M0 20 Q 20 0 0 -20 Q -20 0 0 20" fill="#ef4444"/>
       <path d="M0 15 Q 10 5 0 -10 Q -10 5 0 15" fill="#f59e0b"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">FIRE</text>
    </g>
    
    <!-- Volcano -->
    <g transform="translate(80, 250)">
       <path d="M-25 20 L25 20 L10 -15 L-10 -15 Z" fill="#475569"/>
       <path d="M-10 -15 L10 -15 Q 0 -30 -10 -15" fill="#ef4444"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">VOLCANO</text>
    </g>
    
    <!-- Lightning -->
    <g transform="translate(220, 250)">
       <path d="M-10 -20 L10 -10 L-5 0 L15 20" stroke="#fef08a" stroke-width="4" fill="none"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">FIRE/LIGHTNING</text>
    </g>
  </g>
  
  <!-- Artificial -->
  <g transform="translate(300,0)">
    <text x="150" y="80" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="16" text-anchor="middle">ARTIFICIAL LIGHT SOURCES</text>
    
    <!-- Bulb -->
    <g transform="translate(80, 130)">
       <circle cx="0" cy="-5" r="15" fill="#fef08a" opacity="0.8"/>
       <rect x="-5" y="10" width="10" height="10" fill="#94a3b8"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">BULB</text>
    </g>
    
    <!-- Tube Light -->
    <g transform="translate(220, 130)">
       <rect x="-30" y="-5" width="60" height="10" rx="5" fill="#ffffff" opacity="0.9"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">TUBE LIGHT</text>
    </g>
    
    <!-- Lamp -->
    <g transform="translate(80, 250)">
       <path d="M-20 15 L20 15 L10 -15 L-10 -15 Z" fill="#6366f1"/>
       <rect x="-2" y="15" width="4" height="20" fill="#475569"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">LAMP</text>
    </g>
    
    <!-- Candle -->
    <g transform="translate(220, 250)">
       <rect x="-8" y="0" width="16" height="30" fill="#f1f5f9"/>
       <path d="M0 -5 Q 5 -10 0 -15 Q -5 -10 0 -5" fill="#f59e0b"/>
       <text x="0" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">CANDLE</text>
    </g>
  </g>
</svg>
