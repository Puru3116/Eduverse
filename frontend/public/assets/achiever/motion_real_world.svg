<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">PHYSICS IN DAILY LIFE</text>
  
  <!-- Grid -->
  <g transform="translate(50, 80)">
    <!-- Transport -->
    <rect width="230" height="130" rx="15" fill="#1e293b"/>
    <text x="115" y="30" fill="#6366f1" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">TRANSPORTATION</text>
    <path d="M60 90 L170 90 L160 70 L100 70 Z" fill="#6366f1"/>
    <circle cx="80" cy="95" r="8" fill="#475569"/>
    <circle cx="150" cy="95" r="8" fill="#475569"/>
    <text x="115" y="115" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Cars & Bicycles (Newton's Laws)</text>
    
    <!-- Sports -->
    <rect x="250" width="230" height="130" rx="15" fill="#1e293b"/>
    <text x="365" y="30" fill="#10b981" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">SPORTS</text>
    <circle cx="365" cy="75" r="15" fill="#10b981"/>
    <path d="M385 75 L420 75" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="365" y="115" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Projectile Motion & Force</text>
  </g>
  
  <g transform="translate(50, 230)">
    <!-- Nature -->
    <rect width="230" height="130" rx="15" fill="#1e293b"/>
    <text x="115" y="30" fill="#f59e0b" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">NATURE</text>
    <path d="M115 50 L115 90" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
    <path d="M100 95 Q 115 110 130 95" fill="#f59e0b" opacity="0.6"/>
    <text x="115" y="115" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Falling Objects (Gravity)</text>
    
    <!-- Safety -->
    <rect x="250" width="230" height="130" rx="15" fill="#1e293b"/>
    <text x="365" y="30" fill="#f43f5e" font-family="sans-serif" font-weight="black" font-size="14" text-anchor="middle">SAFETY</text>
    <rect x="335" y="60" width="60" height="40" rx="5" fill="#f43f5e" opacity="0.3"/>
    <line x1="335" y1="60" x2="395" y2="100" stroke="#f43f5e" stroke-width="4"/>
    <text x="365" y="115" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Seatbelts & Airbags (Inertia)</text>
  </g>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="0" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
