<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" rx="20" fill="#020617"/>
  
  <text x="300" y="50" fill="#ffffff" font-family="sans-serif" font-weight="black" font-size="24" text-anchor="middle">PETROLEUM & NATURAL GAS</text>

  <!-- Oil Rig -->
  <g transform="translate(100, 100)">
    <path d="M20 200 L80 200 L50 50 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="45" y="50" width="10" height="150" fill="#94a3b8"/>
    <text x="50" y="230" fill="#ffffff" font-size="12" text-anchor="middle">OIL RIG</text>
  </g>

  <!-- Gas Cylinder -->
  <g transform="translate(400, 150)">
    <rect width="80" height="120" rx="40" fill="#f43f5e" opacity="0.8"/>
    <rect x="20" y="-10" width="40" height="20" rx="5" fill="#475569"/>
    <text x="40" y="150" fill="#ffffff" font-size="12" text-anchor="middle">LPG (COOKING GAS)</text>
  </g>
</svg>
